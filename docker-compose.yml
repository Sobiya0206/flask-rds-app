version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  flaskapp:
    build: .
    container_name: flaskapp
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - sqlserver