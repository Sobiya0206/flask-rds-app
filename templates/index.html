<!DOCTYPE html>
<html>
<head>
    <title>Flask RDS App</title>
</head>
<body>
    <h2>Add User</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Enter name" required>
        <button type="submit">Add</button>
    </form>

    <h2>Users List</h2>
    <ul>
        {% for user in users %}
            <li>{{ user.name }}</li>
        {% endfor %}
    </ul>
</body>
</html>
